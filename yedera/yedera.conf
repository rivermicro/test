# Sampling defaults.
# temperature = 0.8
# top_p = 0.95
# min_p = 0.05
# seed = random

# Optional booleans: true/false, yes/no, on/off, 1/0
# interactive = false
# verbose = false

# Debug startup output: CUDA detection/version, model load progress,
# GPU/CPU offload details, and per-file RAG learning logs.
# debug = true

