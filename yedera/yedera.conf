# Auto-generated copies of this file live in the current working directory or under ~/.yedera/.
# You can also point the CLI at another file with: yedera --config /path/to/yedera.conf

# Assistant system prompt.
prompt = "You are Yedera, a helpful local assistant running on garage server."

# Local GGUF model file used directly by yedera.
model_path = "model/llama3.2-1b.gguf"

# Optional local GGUF embeddings model and knowledge directory for RAG.
# Relative paths in this file resolve from the directory containing yedera.conf.
model_embeddings = "model/nomic-embed-text-v1.5.gguf"
# rag_documents_path = "rag"

# Optional default one-shot user prompt.
# user_prompt = "Summarize this project in one sentence."

ctx_size = 2048
n_predict = 256

# Omit n_gpu_layers to use NVIDIA automatically when a GPU backend is available.
# Set n_gpu_layers = 0 to force CPU-only execution.

# Sampling defaults.
temperature = 0.8
top_p = 0.95
min_p = 0.05
seed = random

# Optional booleans: true/false, yes/no, on/off, 1/0
interactive = false
verbose = false

# Debug startup output: CUDA detection/version, model load progress,
# GPU/CPU offload details, and per-file RAG learning logs.
debug = true